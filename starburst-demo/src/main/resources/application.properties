spring.application.name=starburst-demo
server.port=8081

# Starburst / Trino JDBC connection
starburst.jdbc.url=jdbc:trino://localhost:8080/tpch/tiny
starburst.jdbc.username=admin
starburst.jdbc.password=

# HikariCP tuning for Trino (Trino does not support isValid(), use a test query)
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
