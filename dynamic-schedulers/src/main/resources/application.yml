scheduling:
  virtual-threads: true   # requires Java 21+ and Spring Boot 3.2+
  thread-pool-size: 5     # ignored when virtual-threads is true
  tasks:
    - name: "order-cleanup"
      fixed-rate: 5000
      bean: "orderService"
      method: "cleanup"

    - name: "report-generator"
      cron: "0 0 * * * *"
      bean: "reportService"
      method: "generate"

    - name: "health-check"
      fixed-delay: 10000
      initial-delay: 2000
      bean: "healthService"
      method: "check"
