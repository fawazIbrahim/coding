spring:
  application:
    name: callback-system

  # ── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:callback_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      # Size the pool to match poller concurrency: batchSize + headroom for API threads
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CallbackHikariPool

  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns the schema; Hibernate only validates
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # ── Flyway migrations ───────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ── Virtual threads (Java 25 / Loom) ───────────────────────────────────────
  threads:
    virtual:
      enabled: true            # Enables virtual threads for Tomcat + @Scheduled

  # ── Graceful shutdown ───────────────────────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: 30s

# ── Callback system properties ──────────────────────────────────────────────────
callback:
  poller:
    batch-size: 20             # Executions claimed per SKIP LOCKED sweep
    poll-interval-ms: 1000     # How often the poller wakes up (ms)
    stuck-threshold-minutes: 5 # PENDING executions older than this are re-queued

  retry:
    scheduler-interval-ms: 30000  # How often RETRY_SCHEDULED → PENDING reset runs

  executor:
    default-timeout-seconds: 30

# ── Actuator / Observability ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    com.example.callback: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
