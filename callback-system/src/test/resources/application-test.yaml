# Test profile — overrides that allow the context to start without real infra.
# Replace with Testcontainers for full integration coverage.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092   # embedded Kafka via @EmbeddedKafka in integration tests

callback:
  kafka:
    partitions: 1
    replicas: 1
  retry:
    scheduler-interval-ms: 3600000   # disable scheduler during unit tests
    stuck-pending-threshold-minutes: 60
